name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"        # 1.2.3        -> stable release
      - "[0-9]+.[0-9]+.[0-9]+-*"      # 1.2.3-beta.0 -> BRAT pre-release

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release in flight

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches manifest.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$MANIFEST_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Tag '$TAG_NAME' does not match manifest.json version '$MANIFEST_VERSION'. Obsidian requires them identical (no 'v' prefix)."
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
